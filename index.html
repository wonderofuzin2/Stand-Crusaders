<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>JoJo Stands</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <h1>JOJO STANDS</h1>
    <p>Os poderes mais bizarros do anime</p>
</header>

<section class="search-box">
    <input type="text" id="searchInput" placeholder="🔎 Buscar stand...">
</section>

<main class="grid" id="stands">

    <div class="card">
        <img src="imagens/star platinum.webp">
        <div class="info">
            <h2>Star Platinum</h2>
            <p>Força absurda + parar o tempo</p>
        </div>
    </div>

    <div class="card">
        <img src="imagens/the world.webp">
        <div class="info">
            <h2>The World</h2>
            <p>Controle do tempo</p>
        </div>
    </div>

    <div class="card">
        <img src="imagens/killer queen.webp">
        <div class="info">
            <h2>Killer Queen</h2>
            <p>Transforma tudo em bomba</p>
        </div>
    </div>

    <div class="card">
        <img src="imagens/king crimson.webp">
        <div class="info">
            <h2>King Crimson</h2>
            <p>Apaga o tempo</p>
        </div>
    </div>

    <div class="card">
        <img src="imagens/crazy diamond.webp">
        <div class="info">
            <h2>Crazy Diamond</h2>
            <p>Restauração total</p>
        </div>
    </div>

</main>

<footer>
    <p>Feito por você ⚡</p>
</footer>

<script>
const input = document.getElementById("searchInput");

input.addEventListener("keyup", () => {
    const filter = input.value.toLowerCase();
    const cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        const text = card.innerText.toLowerCase();
        card.style.display = text.includes(filter) ? "block" : "none";
    });
});
</script>

</body>
</html>
